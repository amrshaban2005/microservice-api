services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: amr
      POSTGRES_PASSWORD: password
      POSTGRES_DB: banking
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
